services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nfdp
      POSTGRES_USER: nfdp
      POSTGRES_PASSWORD: nfdp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - minio
      - redis

  worker:
    build: ./backend
    command: arq app.workers.main.WorkerSettings
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - minio
      - redis

  frontend:
    build: ./frontend
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
