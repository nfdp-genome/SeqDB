domain: microbe
display_name: "Pathogen & Microbe"
ena_checklist: ERC000020
ncbi_package: Pathogen.cl.1.0

fields:
  organism:
    type: string
    required: true
    ontology: ncbi_taxonomy
    description: "Scientific name of the organism"
    ena: { name: "organism" }
    ncbi: { name: "organism" }
  tax_id:
    type: integer
    required: true
    description: "NCBI taxonomy ID"
    ena: { name: "tax_id" }
    ncbi: { name: "tax_id" }
  strain:
    type: string
    required: false
    description: "Microbial strain name"
    ena: { name: "strain" }
    ncbi: { name: "strain" }
  isolate:
    type: string
    required: false
    description: "Isolate identifier"
    ena: { name: "isolate" }
    ncbi: { name: "isolate" }
  isolation_source:
    type: string
    required: false
    description: "Source from which the organism was isolated"
    ena: { name: "isolation_source" }
    ncbi: { name: "isolation_source" }
  host:
    type: string
    required: true
    ontology: ncbi_taxonomy
    description: "Host organism"
    ena: { name: "host" }
    ncbi: { name: "host" }
  collection_date:
    type: date
    required: true
    description: "Date of sample collection"
    ena: { name: "collection_date", format: "YYYY-MM-DD" }
    ncbi: { name: "collection_date", format: "YYYY-MM-DD" }
  geographic_location:
    type: string
    required: true
    ontology: gaz
    description: "Geographic origin of the sample"
    ena: { name: "geographic_location_(country_and/or_sea)" }
    ncbi: { name: "geo_loc_name" }
  serotype:
    type: string
    required: false
    ena: { name: "serotype" }
    ncbi: { name: "serotype" }
  collected_by:
    type: string
    required: false
    ena: { name: "collected_by" }
    ncbi: { name: "collected_by" }
